<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUNdusky</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  color: #1a2a44;
}

/* HERO */
.hero {
  height: 80vh;
  background: url('images/hero-bg.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero h1 {
  font-size: 48px;
}

.hero p {
  font-size: 20px;
}

/* GRID */
.container {
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

.grid {
  display: grid;
  gap: 20px;
}

.card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  color: white;
}

.overlay h2 {
  margin: 0;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>FUNdusky</h1>
    <p>Find where to eat, stay, and have fun in Sandusky</p>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="grid">

    <!-- WATER -->
    <a href="water.html" class="card">
      <img src="images/eriewakezone-hero.jpg">
      <div class="overlay">
        <h2>On the Water</h2>
        <p>Jet skis, boats, and sunset cruises in Sandusky Bay.</p>
      </div>
    </a>

    <!-- EAT (THIS IS THE FIXED ONE) -->
    <a href="eat.html" class="card">
      <img src="images/thirstypony-wings.jpg">
      <div class="overlay">
        <h2>Where to Eat</h2>
        <p>Local favorites, real food picks, and restaurants worth recommending.</p>
      </div>
    </a>

    <!-- STAY -->
    <a href="stay.html" class="card">
      <img src="images/stay-stables-sign.jpg">
      <div class="overlay">
        <h2>Where to Stay</h2>
      </div>
    </a>

    <!-- NIGHTLIFE -->
    <a href="nightlife.html" class="card">
      <img src="images/nightlife.jpg">
      <div class="overlay">
        <h2>Nightlife</h2>
      </div>
    </a>

    <!-- FAMILY -->
    <a href="family.html" class="card">
      <img src="images/family.jpg">
      <div class="overlay">
        <h2>Family Fun</h2>
      </div>
    </a>

    <!-- ATTRACTIONS -->
    <a href="attractions.html" class="card">
      <img src="images/attractions.jpg">
      <div class="overlay">
        <h2>Attractions</h2>
      </div>
    </a>

  </div>

</div>

</body>
</html>
